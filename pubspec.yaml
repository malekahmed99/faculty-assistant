name: ai_campus_guide
description: AI Campus Guide - Flutter app for Faculty of Science, Ain Shams University
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # Firebase
  firebase_core: ^3.6.0
  cloud_firestore: ^5.4.0

  # State Management
  flutter_riverpod: ^2.6.1

  # Google Maps
  google_maps_flutter: ^2.14.2

  # Utilities
  url_launcher: ^6.3.2
  flutter_dotenv: ^5.2.1

  # UI
  cupertino_icons: ^1.0.8

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.1

flutter:
  uses-material-design: true
  assets:
    - .env

