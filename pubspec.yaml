publish_to: "none"
version: 1.0.0+1

environment:
  sdk: ">=3.0.0 <4.0.0"

dependencies:
  bloc: ^9.2.0
  cloud_firestore: ^6.2.0
  cupertino_icons: ^1.0.8
  equatable: ^2.0.8
  firebase_core: ^4.6.0
  fl_chart: ^0.68.0
  flutter:
    sdk: flutter
  flutter_bloc: ^9.1.1
  flutter_dotenv: ^5.2.1
  flutter_map: ^8.3.0
  flutter_riverpod: ^2.6.1
  geolocator: ^14.0.2
  google_fonts: ^8.0.2
  google_maps_flutter: ^2.14.2
  latlong2: ^0.9.1
  shared_preferences: ^2.2.2
  url_launcher: ^6.3.2

dev_dependencies:
  flutter_lints: ^3.0.1
  flutter_test:
    sdk: flutter

flutter:
  uses-material-design: true
